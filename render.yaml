services:
  - type: web
    runtime: node
    name: casa-meni-api
    repo: https://github.com/nivbiton3768-dotcom/casa-meni
    rootDir: apps/api
    plan: free
    buildCommand: npm install --production=false && npx prisma generate && npm run build
    startCommand: node dist/main
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_iM9ypJUXTOZ8@ep-late-field-ak714l7x.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: casa-meni-prod-jwt-secret-2026
      - key: FRONTEND_URL
        value: https://web-chi-six-85.vercel.app
      - key: NODE_ENV
        value: production
      # Optional: enable email delivery. Sign up at https://resend.com (free tier 3k/mo).
      # - key: RESEND_API_KEY
      #   value: re_your_key_here
      # - key: EMAIL_FROM
      #   value: "Casa Meni <noreply@yourdomain.com>"
      # Optional: enable online rent payments via Stripe.
      # Test keys: https://dashboard.stripe.com/test/apikeys
      # Webhook secret: https://dashboard.stripe.com/test/webhooks (point to /api/v1/webhooks/stripe)
      # - key: STRIPE_SECRET_KEY
      #   value: sk_test_...
      # - key: STRIPE_WEBHOOK_SECRET
      #   value: whsec_...
      # - key: STRIPE_PUBLISHABLE_KEY
      #   value: pk_test_...
      # Optional: enable bank/Cash App/Chime auto-sync via Plaid.
      # Sign up: https://dashboard.plaid.com/signup (free sandbox + production after review).
      # PLAID_ENV=sandbox for testing, production once your app is approved.
      # - key: PLAID_CLIENT_ID
      #   value: your_plaid_client_id
      # - key: PLAID_SECRET
      #   value: your_plaid_secret
      # - key: PLAID_ENV
      #   value: sandbox
      # Optional: enable async background jobs (BullMQ + Redis).
      # On Render, add a Redis instance (free tier 25MB) and use its internal URL.
      # Without REDIS_URL, jobs run inline synchronously (still works, just no retries).
      # - key: REDIS_URL
      #   value: redis://red-xxx:6379
